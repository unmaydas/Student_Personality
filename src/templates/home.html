<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Personality Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background: linear-gradient(135deg,#667eea,#764ba2);
display:flex;
align-items:center;
justify-content:center;
}

.container{

width:950px;
padding:40px;

background: rgba(255,255,255,0.15);
backdrop-filter: blur(12px);

border-radius:18px;

box-shadow:0 20px 60px rgba(0,0,0,0.25);

color:white;
}

h1{
text-align:center;
margin-bottom:35px;
font-weight:600;
letter-spacing:1px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.card{
background:rgba(255,255,255,0.12);
padding:25px;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:rgba(255,255,255,0.18);
}

.card h3{
margin-bottom:18px;
font-weight:500;
}

label{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:18px;
font-size:14px;
}

.range-info{
opacity:0.9;
font-size:13px;
}

input[type="range"]{
width:100%;
margin-top:6px;
}

select{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
outline:none;
}

button{

width:100%;
margin-top:35px;

padding:14px;

font-size:16px;

border:none;

border-radius:10px;

background: linear-gradient(90deg,#00c6ff,#0072ff);

color:white;

cursor:pointer;

font-weight:600;

transition:0.3s;
}

button:hover{

transform:scale(1.03);

box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.result{

margin-top:30px;

text-align:center;

font-size:24px;

font-weight:600;

color:#ffe082;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Personality Predictor</h1>

<form action="/" method="post">

<div class="grid">

<!-- Activity Level -->

<div class="card">

<h3>Activity Level</h3>

<label>
Hours spent alone per day
<span class="range-info">(0-11) | <span id="v1">5</span></span>
</label>

<input type="range" name="Time_spent_Alone" min="0" max="11" value="5"
oninput="document.getElementById('v1').innerText=this.value">


<label>
Social events per month
<span class="range-info">(0-10) | <span id="v2">3</span></span>
</label>

<input type="range" name="Social_event_attendance" min="0" max="10" value="3"
oninput="document.getElementById('v2').innerText=this.value">


<label>
Days going outside per week
<span class="range-info">(0-7) | <span id="v3">3</span></span>
</label>

<input type="range" name="Going_outside" min="0" max="7" value="3"
oninput="document.getElementById('v3').innerText=this.value">


<label>
Close friends you interact with
<span class="range-info">(0-15) | <span id="v4">5</span></span>
</label>

<input type="range" name="Friends_circle_size" min="0" max="15" value="5"
oninput="document.getElementById('v4').innerText=this.value">


<label>
Social media posts per week
<span class="range-info">(0-10) | <span id="v5">2</span></span>
</label>

<input type="range" name="Post_frequency" min="0" max="10" value="2"
oninput="document.getElementById('v5').innerText=this.value">

</div>


<!-- Social Feelings -->

<div class="card">

<h3>Social Feelings</h3>

<label>
Do you feel nervous speaking in front of people?
</label>

<select name="Stage_fear">

<option value="" disabled selected>Select</option>
<option value="Yes">Yes</option>
<option value="No">No</option>

</select>

<label>
Do you feel drained after socializing?
</label>

<select name="Drained_after_socializing">

<option value="" disabled selected>Select</option>
<option value="Yes">Yes</option>
<option value="No">No</option>

</select>

</div>

</div>

<button type="submit">Predict Personality</button>

</form>

{% if results %}

<div class="result">

Prediction : {{ results }}

</div>

{% endif %}

</div>

</body>
</html>
